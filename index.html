<script>
/* Each question: concept (teach from zero) -> prompt -> answer -> worked solution */
const QS = [
{n:1, topic:"Graph code", pts:9, type:"written",
 concept:`<p><b>What's an adjacency matrix?</b> A graph is a set of vertices (nodes) connected by edges. One way to store it is a 2-D grid called an <b>adjacency matrix</b>: <code>weights[i][j]</code> holds the weight of the edge between vertex i and vertex j. If there's no edge, the cell holds a special "sentinel" value — here that's <b>999</b>.</p>
 <p><b>Row vs column.</b> A <b>row</b> is one vertex's edges across all others (fix i, vary j). A <b>column</b> is the reverse (fix j, vary i). This question wants you to walk down ONE column.</p>
 <p><b>Average = sum ÷ count.</b> You add up the real values (ignore the 999s), count how many you added, then divide.</p>`,
 text:"From the Malik <code>graphType</code> class, code a C++ method that finds and returns the <b>average of all values not equal to 999</b> in a <b>specific column</b> of the adjacency matrix. The column number is passed as an argument.",
 fig:`private:
  int gSize;          // number of vertices
  double **weights;   // the adjacency matrix`,
 model:`<pre>double graphType::columnAverage(int col) {
  double sum = 0;
  int count = 0;
  for (int i = 0; i &lt; gSize; i++) {   // walk DOWN the column
    if (weights[i][col] != 999) {      // skip "no edge"
      sum += weights[i][col];
      count++;
    }
  }
  if (count == 0) return 0;            // avoid divide-by-zero
  return sum / count;
}</pre>
<b>Why this works:</b> <code>col</code> stays fixed (it's the argument), and <code>i</code> sweeps every row, so you touch every cell in that one column. You only add and count cells that aren't the 999 sentinel, then divide sum by count.`},

{n:2, topic:"Hashing", pts:4, type:"mcq",
 concept:`<p><b>What's a hash table?</b> It's an array where each item's position is computed from the item itself using a <b>hash function</b>. Here the function is <code>h(x) = x % 7</code> (the remainder after dividing by 7), so every ID lands in slot 0–6.</p>
 <p><b>Collision.</b> When two items hash to the same slot, that's a collision. <b>Linear probing</b> resolves it by checking the next slot, then the next, wrapping around to 0 after 6, until it finds an empty one.</p>`,
 text:"Identify the slot for new employee ID <b>712</b> using <code>h(x)=x%7</code> with <b>linear probing</b>.",
 figHTML:`<table style="max-width:200px"><tr><th>Slot</th><th>Value</th></tr>
   <tr><td>0</td><td>657</td></tr><tr><td>1</td><td>—</td></tr><tr><td>2</td><td>—</td></tr>
   <tr><td>3</td><td>—</td></tr><tr><td>4</td><td>—</td></tr><tr><td>5</td><td>150</td></tr><tr><td>6</td><td>843</td></tr></table>`,
 options:["0","1","2","3","4","5","6"],
 correct:1,
 solve:`<ol>
   <li>Compute the home slot: 712 ÷ 7 = 101 remainder <b>5</b> (because 7×101 = 707, and 712 − 707 = 5). So h(712)=5.</li>
   <li>Slot 5 already holds 150 → <b>collision</b>. Start probing forward.</li>
   <li>Slot 6? holds 843 — taken.</li>
   <li>Wrap to slot 0? holds 657 — taken.</li>
   <li>Slot 1? <b>empty</b> → place 712 here.</li>
 </ol><div class="ans">Answer: slot 1</div>`,
 expl:`712 % 7 = 5, but slot 5 is taken (150). Probe 6 (843), 0 (657), then 1 (empty). <b>Lands in slot 1.</b>`},

{n:3, topic:"Recursion code", pts:9, type:"written",
 concept:`<p><b>What's a BST?</b> A Binary Search Tree keeps keys ordered: everything in a node's <b>left</b> subtree is smaller, everything in its <b>right</b> subtree is larger.</p>
 <p><b>The magic of in-order traversal.</b> If you visit Left → Node → Right recursively, a BST spits out its keys in <b>sorted order</b>. That's exactly what "in name order" means here.</p>
 <p><b>Recursion needs a base case.</b> When the pointer is NULL (empty), do nothing and return — that stops the recursion.</p>`,
 text:"Given a BST where <code>name</code> is the key, write a recursive function <code>listRegister</code> that displays <b>all names and ages in name order</b>, each on its own line. One parameter: pointer to the root.",
 fig:`struct recType {
  string name;
  int age;
  recType *lChild;
  recType *rChild;
};`,
 model:`<pre>void listRegister(recType *p) {
  if (p != NULL) {
    listRegister(p-&gt;lChild);                 // 1. smaller names first
    cout &lt;&lt; p-&gt;name &lt;&lt; " " &lt;&lt; p-&gt;age &lt;&lt; endl; // 2. this node
    listRegister(p-&gt;rChild);                 // 3. larger names
  }
}</pre>
<b>Why:</b> this is a textbook <b>in-order</b> traversal. Left-subtree (all alphabetically-earlier names) prints first, then the current node, then the right subtree. Because it's a BST, that produces alphabetical order. There's no age filter, so every node prints.`},

{n:4, topic:"Prim's MST", pts:4, type:"mcq",
 concept:`<p><b>Spanning tree.</b> Given a connected graph, a spanning tree picks just enough edges to connect every vertex with no cycles — always exactly V−1 edges. The <b>minimum</b> spanning tree (MST) is the cheapest such set.</p>
 <p><b>Prim's algorithm</b> grows the tree one vertex at a time. Start at a vertex; repeatedly add the <b>cheapest edge that connects a vertex already in the tree to one not yet in it</b>. Never add an edge between two vertices already inside (that'd make a cycle).</p>
 <p><b>Reading the matrix.</b> The number at row X, column Y is the weight of edge X–Y. Blank = no edge.</p>`,
 text:"Using <b>Prim's MST</b> starting at node <b>E</b>, identify the <b>4th edge collected</b>.",
 figHTML:`<table class="matrix"><tr><th></th><th>A</th><th>B</th><th>C</th><th>D</th><th>E</th><th>F</th></tr>
   <tr><th>A</th><td></td><td></td><td>4</td><td>8</td><td></td><td>1</td></tr>
   <tr><th>B</th><td></td><td></td><td></td><td>6</td><td></td><td>5</td></tr>
   <tr><th>C</th><td>4</td><td></td><td></td><td></td><td>3</td><td></td></tr>
   <tr><th>D</th><td>8</td><td>6</td><td></td><td></td><td>7</td><td></td></tr>
   <tr><th>E</th><td></td><td></td><td>3</td><td>7</td><td></td><td>2</td></tr>
   <tr><th>F</th><td>1</td><td>5</td><td></td><td></td><td>2</td><td></td></tr></table>`,
 options:["AC","AD","AF","BD","BF","CE","DE","EF"],
 correct:4,
 solve:`<ol>
   <li>Start: tree = {E}. E's edges: E-C=3, E-D=7, E-F=2. Cheapest = <b>E-F (2)</b>. → 1st edge EF. Tree={E,F}.</li>
   <li>Edges leaving the tree now: E-C=3, E-D=7, F-A=1, F-B=5. Cheapest = <b>F-A (1)</b>. → 2nd edge AF. Tree={E,F,A}.</li>
   <li>Now: E-C=3, E-D=7, F-B=5, A-C=4, A-D=8. Cheapest = <b>E-C (3)</b>. → 3rd edge CE. Tree={E,F,A,C}.</li>
   <li>Now: A-D=8, E-D=7, F-B=5 (C adds nothing new). Cheapest = <b>F-B (5)</b>. → 4th edge BF.</li>
 </ol><div class="ans">Answer: BF</div>`,
 expl:`Order of edges from E: EF(2), AF(1), CE(3), then <b>BF(5)</b> is the 4th.`},

{n:5, topic:"Topological sort", pts:7, type:"written",
 concept:`<p><b>Directed graph.</b> Edges have arrows — 0→1 means you can go from 0 to 1, not back. An <b>adjacency list</b> shows, for each vertex, the list of vertices it points to.</p>
 <p><b>Topological order.</b> A linear listing of all vertices so that every arrow points "forward" — if u→v, then u comes before v. It only works on a DAG (no cycles).</p>
 <p><b>How to find one (Kahn's method):</b> repeatedly pick any vertex with <b>no incoming arrows</b> (in-degree 0), output it, remove its outgoing arrows, and repeat. Several valid answers usually exist.</p>`,
 text:"Given the adjacency list, show a <b>topological ordering</b> of the vertices.",
 fig:`[0] → 1 → 5
[1] → 2 → 3 → 5
[2] → 4
[3] → 4
[4] → (none)
[5] → 6
[6] → 8
[7] → 3 → 8
[8] → 10
[9] → 4 → 7 → 10
[10] → (none)`,
 model:`<b>One valid order: 0, 9, 1, 7, 2, 3, 5, 4, 6, 8, 10</b><br><br>
<b>How:</b> The only vertices with no incoming arrows are <b>0</b> and <b>9</b>, so one of them must start. Output 0, then 9, then keep removing whichever vertex now has nothing pointing into it. Any ordering that respects all arrow directions is correct — this is not unique.`},

{n:6, topic:"Topological sort", pts:7, type:"written",
 concept:`<p>Same idea as the previous question. A <b>topological order</b> lists vertices so every directed edge points forward. Find a vertex with <b>in-degree 0</b> (no arrows into it), output it, delete its out-arrows, repeat.</p>
 <p><b>Tip:</b> compute each vertex's in-degree first by scanning who points to it. Sources (in-degree 0) are your starting candidates.</p>`,
 text:"Given the adjacency list, show a <b>topological ordering</b> of the vertices.",
 fig:`[0] → 1 → 5
[1] → 2 → 3 → 5
[2] → 4
[3] → 4
[4] → (none)
[5] → 6
[6] → 8
[7] → 3 → 8
[8] → 10
[9] → 4 → 7 → 10
[10] → (none)`,
 model:`<b>One valid order: 0, 1, 2, 5, 6, 9, 7, 3, 4, 8, 10</b><br><br>
Start from the in-degree-0 vertices (0 and 9). As long as every edge u→v has u before v, your answer counts. Topological orderings are not unique.`},

{n:7, topic:"DFS", pts:7, type:"written",
 concept:`<p><b>Depth-First Search (DFS)</b> explores as <b>deep</b> as possible before backing up. From a node, follow its first neighbor, then that node's first neighbor, and so on. When you hit a dead end, <b>backtrack</b> to the last node with an unexplored neighbor.</p>
 <p>It uses a <b>stack</b> (or recursion — the call stack IS the stack). Visit neighbors in the order they appear in the list.</p>`,
 text:"Show the order of vertices in a <b>depth-first traversal</b> starting at node 0.",
 fig:`[0] → 1 → 5
[1] → 2 → 3 → 5
[2] → 4
[3] → 4
[4] → (none)
[5] → 6
[6] → 8
[7] → 3 → 8
[8] → 10
[9] → 4 → 7 → 10
[10] → (none)`,
 model:`<b>Answer: 0, 1, 2, 4, 3, 5, 6, 8, 10</b><br><br>
<b>Trace:</b> 0→1→2→4 (dead end, back up) → back at 1, next is 3→4 (already visited, back up) → back at 1, next is 5→6→8→10. Vertices 7 and 9 are never reached from 0.`},

{n:8, topic:"BFS", pts:7, type:"written",
 concept:`<p><b>Breadth-First Search (BFS)</b> explores <b>level by level</b> — all the immediate neighbors first, then their neighbors, and so on, like ripples spreading out.</p>
 <p>It uses a <b>queue</b> (first-in, first-out): enqueue the start, then repeatedly dequeue a vertex, output it, and enqueue its unvisited neighbors.</p>`,
 text:"Show the order of vertices in a <b>breadth-first traversal</b> starting at node 0.",
 fig:`[0] → 1 → 5
[1] → 2 → 3 → 5
[2] → 4
[3] → 4
[4] → (none)
[5] → 6
[6] → 8
[7] → 3 → 8
[8] → 10
[9] → 4 → 7 → 10
[10] → (none)`,
 model:`<b>Answer: 0, 1, 5, 2, 3, 6, 4, 8, 10</b><br><br>
<b>Trace by level:</b> Level 0 = {0}. Level 1 = neighbors of 0 = {1, 5}. Level 2 = {2, 3} (from 1) and {6} (from 5). Level 3 = {4} (from 2) and {8} (from 6). Level 4 = {10} (from 8). Vertices 7 and 9 are unreachable from 0.`},

{n:9, topic:"Mergesort", pts:4, type:"written",
 concept:`<p><b>Mergesort</b> is divide-and-conquer. It keeps <b>splitting</b> the list in half until each piece has one element, then <b>merges</b> the pieces back together in sorted order.</p>
 <p><b>Calls vs merges — read the question carefully!</b> A "call" happens every time mergesort is invoked on a sublist (the splitting phase). A "merge" happens when two sorted halves recombine. This question asks about <b>calls</b>. The order of calls follows the recursion: do the whole LEFT half before touching the right.</p>`,
 text:"8 values sorted by recursive Mergesort: <b>Lin, Md, Ter, Ask, Dav, Jen, Gen, Gab</b>. The 1st call gets the whole list. Show the list passed to the <b>6th call</b>.",
 fig:`Call 1: [Lin,Md,Ter,Ask,Dav,Jen,Gen,Gab]   (whole list)
Call 2: [Lin,Md,Ter,Ask]                     (left half)
Call 3: [Lin,Md]                              (left of left)
Call 4: [Lin]                                 (base case)
Call 5: [Md]                                  (base case)
Call 6: [ ?, ? ]`,
 model:`<b>Answer: (Ter, Ask)</b><br><br>
<b>Why:</b> mergesort finishes the entire left branch before starting any right branch. Calls 1–5 drill all the way down the left side ([Lin,Md] into [Lin] and [Md]). Once that branch is done, the next call is the <b>right half of [Lin,Md,Ter,Ask]</b> — which is <b>[Ter, Ask]</b>. (They're not sorted yet; the question asks what's <i>passed in</i>.)`},

{n:10, topic:"AVL tree", pts:4, type:"written",
 concept:`<p><b>AVL tree</b> = a BST that fixes itself when it gets lopsided. After each insert it checks the <b>balance factor</b> (height of left minus height of right) at each node; if it ever hits ±2, it does a <b>rotation</b> to rebalance.</p>
 <p><b>Key insight for this question:</b> a rotation can change which node is the <b>root</b>. So "the parent of X" depends on the tree's shape <i>after</i> rotations, not the raw insert order.</p>`,
 text:"An <b>AVL tree</b> is built from these keys in order: <b>Toy, Lin, Md, Ter, Ask</b>. What is the key of the <b>parent of the node containing Md</b>?",
 fig:`Insert Toy, then Lin (left of Toy), then Md.
Md unbalances Toy → "Left-Right" case → LR rotation:

   Toy            Md
   /             /  \\
  Lin    →     Lin   Toy
    \\
    Md          (Md is now the ROOT)`,
 model:`<b>Answer: Md is the root — it has no parent.</b><br><br>
<b>Why:</b> inserting Md makes Toy's balance factor ±2 (Toy → Lin → Md is a left-then-right zig-zag), triggering an <b>LR rotation</b> that promotes Md to the root, with Lin and Toy as its children. Later inserts (Ter, Ask) hang below and don't move Md. A root has no parent. (If a value is required, write "none" or "root".)`},

{n:11, topic:"Recursion", pts:4, type:"mcq",
 concept:`<p><b>Tracing recursion</b> means following the calls by hand. Each call either hits a <b>base case</b> (returns immediately) or makes another call with new arguments. Write out the arguments at each step until a base case fires, then carry the return value back up.</p>
 <p>Here the function moves x up by 1 and y down by 1 each time, so they march toward each other.</p>`,
 text:"Show the output of <code>cout &lt;&lt; test(1,13)</code>.",
 fig:`int test(int x, int y) {
  if (x == y)     return x;
  else if (x > y) return (x + y);
  else            return test(x + 1, y - 1);
}`,
 options:["7","13","14","12","1"],
 correct:0,
 solve:`<ol>
   <li>(1,13): 1&lt;13 → call test(2,12)</li>
   <li>(2,12): → test(3,11)</li>
   <li>(3,11): → test(4,10)</li>
   <li>(4,10): → test(5,9)</li>
   <li>(5,9): → test(6,8)</li>
   <li>(6,8): → test(7,7)</li>
   <li>(7,7): x == y → return <b>7</b></li>
 </ol><div class="ans">Answer: 7 &nbsp;(shortcut: the gap 13−1=12 is even, so they meet at the midpoint (1+13)/2 = 7)</div>`,
 expl:`x climbs, y drops, meeting at (7,7) → returns 7.`},

{n:12, topic:"Heaps", pts:2, type:"mcq",
 concept:`<p><b>Heap</b> = a complete binary tree stored in an array, where each parent is ≥ its children (max-heap) or ≤ them (min-heap).</p>
 <p><b>Push</b> adds the new value at the bottom and "bubbles it up," swapping with its parent while it's out of order. The number of swaps can't exceed the tree's <b>height</b>, and a complete binary tree of n nodes has height about log₂ n.</p>`,
 text:"What is the algorithmic complexity of the <b>push</b> operation for a heap with n elements?",
 options:["O(1)","O(log n)","O(n)","O(n log n)","O(n²)"],
 correct:1,
 solve:`<ol>
   <li>Push appends the element at the next open spot (the bottom of the tree).</li>
   <li>It then swaps upward toward the root while larger than its parent.</li>
   <li>Worst case = one swap per level = the height of the heap.</li>
   <li>Height of a complete binary tree of n nodes = ⌊log₂ n⌋.</li>
 </ol><div class="ans">Answer: O(log n)</div>`,
 expl:`Bubbling up costs at most the height of the heap, which is log n. <b>O(log n).</b>`},

{n:13, topic:"Tree traversal", pts:5, type:"mcq",
 concept:`<p><b>Post-order traversal</b> visits a node's <b>Left</b> subtree, then its <b>Right</b> subtree, then the <b>node itself</b> last. Memory hook: "Root is POSTed last."</p>
 <p>Apply the rule recursively to every subtree — you always finish both children before printing a parent.</p>`,
 text:"Identify the <b>post-order</b> traversal of the tree.",
 fig:`          8
         / \\
        4   12
       / \\  / \\
      2  6 10 14`,
 options:["2,4,6,8,10,12,14","8,4,2,6,12,10,14","2,6,4,10,14,12,8","8,4,12,2,6,10,14","2,6,4,10,12,14,8","14,10,12,6,2,4,8","none of the other answers"],
 correct:2,
 solve:`<ol>
   <li>Left subtree of 8 (rooted at 4): do its left (2), its right (6), then 4 → <b>2, 6, 4</b>.</li>
   <li>Right subtree of 8 (rooted at 12): left (10), right (14), then 12 → <b>10, 14, 12</b>.</li>
   <li>Finally the root: <b>8</b>.</li>
 </ol><div class="ans">Answer: 2,6,4,10,14,12,8</div>`,
 expl:`Left, Right, Root throughout → 2,6,4,10,14,12,8.`},

{n:14, topic:"BFS (directed)", pts:5, type:"mcq",
 concept:`<p><b>BFS on a directed graph.</b> Arrows matter — you can only travel in the arrow's direction. Start at node 0, visit neighbors level by level using a queue.</p>
 <p><b>Reachability trap:</b> a node with <b>no incoming arrows</b> (a "source") can never be reached from somewhere else. If you start at 0 and some node only has outgoing arrows, you'll never visit it.</p>`,
 text:"Identify the <b>breadth-first traversal</b> sequence (start at 0).",
 fig:`Edges:  0→1   0→5   5→2   2→1
        4→5   4→3   3→1   3→2

      0 ──▶ 1
      │   ↗ │
      ▼  /  ▼
      5 ──▶ 2
      ▲
      4 ──▶ 3`,
 options:["0,1,2,3,4,5","0,1,5,2,3,4","0,1,2,5,3,4","0,5,4,1,2,3","0,5,4,3,2,1","none of the other answers"],
 correct:5,
 solve:`<ol>
   <li>Look at node 4: its arrows are 4→5 and 4→3. <b>Nothing points INTO 4</b> → 4 is unreachable from 0.</li>
   <li>Node 3 only receives an arrow from 4 (4→3), so 3 is also unreachable from 0.</li>
   <li>BFS from 0: visit 0 → enqueue 1, 5 → visit 1 (no new) → visit 5 → enqueue 2 → visit 2. Result: 0, 1, 5, 2.</li>
   <li>Every multiple-choice option lists all 6 nodes (including the unreachable 3 and 4), so none match 0,1,5,2.</li>
 </ol><div class="ans">Answer: none of the other answers</div>`,
 expl:`Node 4 (and therefore 3) can't be reached from 0, so the real BFS is just 0,1,5,2 — not any listed option.`},

{n:15, topic:"Tree traversal", pts:5, type:"mcq",
 concept:`<p><b>Post-order</b> again: Left subtree, then Right subtree, then the node. Do it recursively. Note this tree is <b>not</b> a BST (values aren't ordered), but traversal rules don't care about order — you just follow the shape.</p>`,
 text:"Identify the <b>post-order</b> traversal of the tree.",
 fig:`          12
         /  \\
       17    21
      / \\    / \\
    41  20  19  11`,
 options:["11,12,17,19,20,21,41","12,17,21,41,20,19,11","12,17,41,20,21,19,11","41,20,17,19,11,21,12","41,20,19,11,17,21,12","41,17,20,12,19,21,11","none of the other answers"],
 correct:3,
 solve:`<ol>
   <li>Left subtree (rooted at 17): left 41, right 20, then 17 → <b>41, 20, 17</b>.</li>
   <li>Right subtree (rooted at 21): left 19, right 11, then 21 → <b>19, 11, 21</b>.</li>
   <li>Root last: <b>12</b>.</li>
 </ol><div class="ans">Answer: 41,20,17,19,11,21,12</div>`,
 expl:`Left, Right, Root → 41,20,17,19,11,21,12.`},

{n:16, topic:"DFS (directed)", pts:5, type:"mcq",
 concept:`<p><b>DFS on a directed graph.</b> Follow arrows as deep as possible, backtrack at dead ends. Same reachability rule as BFS: a node with no incoming arrows can't be reached from the start.</p>`,
 text:"Identify the <b>depth-first traversal</b> sequence (start at 0).",
 fig:`Edges:  0→1   0→5   5→2   3→1   3→2
        4→5   4→3   2→1

      0 ──▶ 1
      │   ↗ │
      ▼  /  ▼
      5 ──▶ 2
      ▲
      4 ──▶ 3`,
 options:["0,1,2,3,4,5","0,1,5,2,3,4","0,1,2,5,3,4","0,5,4,1,2,3","0,5,4,3,2,1","none of the other answers"],
 correct:5,
 solve:`<ol>
   <li>Node 4 has only outgoing arrows (4→5, 4→3) — nothing points into it, so it's unreachable from 0.</li>
   <li>Node 3 is reached only via 4→3, so it too is unreachable from 0.</li>
   <li>DFS from 0 visits only {0, 1, 2, 5}.</li>
   <li>Every listed option includes 3 and 4, so none can be correct.</li>
 </ol><div class="ans">Answer: none of the other answers</div>`,
 expl:`Same trap as Q14: nodes 3 and 4 are unreachable from 0, so no 6-node option works.`},

{n:17, topic:"Tree traversal", pts:5, type:"mcq",
 concept:`<p><b>Pre-order traversal</b> visits the <b>node first</b>, then its Left subtree, then its Right subtree. Memory hook: "Root comes PRE (before) the children."</p>`,
 text:"Identify the <b>pre-order</b> traversal of the tree.",
 fig:`          8
         / \\
        4   12
       / \\  / \\
      2  6 10 14`,
 options:["2,4,6,8,10,12,14","8,4,2,6,12,10,14","2,6,4,10,14,12,8","8,4,12,2,6,10,14","2,6,4,10,12,14,8","14,10,12,6,2,4,8","none of the other answers"],
 correct:1,
 solve:`<ol>
   <li>Visit root first: <b>8</b>.</li>
   <li>Then the whole left subtree, pre-order: 4, then 2, then 6 → <b>4, 2, 6</b>.</li>
   <li>Then the whole right subtree: 12, then 10, then 14 → <b>12, 10, 14</b>.</li>
 </ol><div class="ans">Answer: 8,4,2,6,12,10,14</div>`,
 expl:`Root, Left, Right → 8,4,2,6,12,10,14.`},

{n:18, topic:"Tree traversal", pts:5, type:"mcq",
 concept:`<p><b>Pre-order</b>: node first, then Left, then Right — applied recursively. The root of the whole tree is always the very first thing printed in a pre-order list (a handy way to eliminate wrong options fast).</p>`,
 text:"Identify the <b>pre-order</b> traversal of the tree.",
 fig:`          12
         /  \\
       17    21
      / \\    / \\
    41  20  19  11`,
 options:["11,12,17,19,20,21,41","12,17,21,41,20,19,11","12,17,41,20,21,19,11","41,20,17,19,11,21,12","41,20,19,11,17,21,12","41,17,20,12,19,21,11","none of the other answers"],
 correct:2,
 solve:`<ol>
   <li>Root first: <b>12</b>. (Only options starting with 12 can be right.)</li>
   <li>Left subtree pre-order: 17, 41, 20.</li>
   <li>Right subtree pre-order: 21, 19, 11.</li>
 </ol><div class="ans">Answer: 12,17,41,20,21,19,11</div>`,
 expl:`Root, Left, Right → 12,17,41,20,21,19,11.`},

{n:19, topic:"BST", pts:4, type:"mcq",
 concept:`<p><b>Plain BST insertion</b> (no balancing). The <b>first</b> key inserted becomes the root and never moves. Each later key walks down: go left if smaller, right if larger, until it finds an empty spot.</p>
 <p>"Unbalanced" just means no rotations happen — unlike an AVL tree.</p>`,
 text:"An <b>unbalanced BST</b> is built from: <b>Toy, Lin, Md, Ter, Ask</b>. What is the key of the <b>parent of the node containing Toy</b>?",
 fig:`       Toy   ← inserted first = root
      /
    Lin
   /   \\
 Ask    Md
          \\
          Ter`,
 options:["Toy is the root (no parent)","Lin","Md","Ter","Ask"],
 correct:0,
 solve:`<ol>
   <li>Toy is inserted first, so it becomes the <b>root</b>.</li>
   <li>In a plain BST there are no rotations, so the root never changes.</li>
   <li>The root has no parent.</li>
 </ol><div class="ans">Answer: Toy is the root — no parent</div>`,
 expl:`Toy was first in, so it's the root and has no parent. (Contrast with Q10's AVL, where rotations <i>can</i> move the root.)`},

{n:20, topic:"Tree layers", pts:5, type:"mcq",
 concept:`<p><b>Binary tree layers (levels).</b> Each node can have up to 2 children, so each layer can hold at most <b>twice</b> as many nodes as the one above. With layer 1 holding 1 node, the max sizes go 1, 2, 4, 8, … — that's <b>2^(L−1)</b> for layer L.</p>`,
 text:"If the first layer of a binary tree has one element, what is the <b>maximum number of elements in the 4th layer</b>?",
 fig:`Layer 1: 2^0 = 1
Layer 2: 2^1 = 2
Layer 3: 2^2 = 4
Layer 4: 2^3 = ?`,
 options:["2","4","9","8","31","32","33","none of the other answers"],
 correct:3,
 solve:`<ol>
   <li>Each layer at most doubles the previous one.</li>
   <li>Layer L holds at most 2^(L−1) nodes.</li>
   <li>Layer 4 → 2^(4−1) = 2³ = <b>8</b>.</li>
 </ol><div class="ans">Answer: 8</div>`,
 expl:`Max nodes in layer L = 2^(L−1); layer 4 = 2³ = 8.`},

{n:21, topic:"DFS (directed)", pts:5, type:"mcq",
 concept:`<p><b>DFS</b> from a start vertex follows arrows as deep as possible, picking the smallest-numbered unvisited neighbor, and backtracks at dead ends. If a vertex is a <b>source</b> (no arrows into it) it won't be reached from the start — a full traversal then restarts there afterward to cover the whole graph.</p>`,
 text:"Choose the <b>depth-first traversal</b> order of the directed graph G₁.",
 fig:`Edges: 1→2  1→4  2→5  3→1  3→4  4→5

      1 ──▶ 2
      ▲ \\    \\
      |  ▼    ▼
      3 ─▶ 4 ─▶ 5`,
 options:["3 1 2 4 5","1 2 4 5 3","1 2 5 4 3","none of the other answers","3 2 1 4 5"],
 correct:2,
 solve:`<ol>
   <li>Start at 1. Its neighbors (ascending) are 2 and 4. Go to <b>2</b>.</li>
   <li>2 → 5. Go to <b>5</b>. 5 has no outgoing edges → dead end, backtrack.</li>
   <li>Back at 1, next neighbor is <b>4</b>. 4 → 5 (already visited). Done with reachable nodes: 1, 2, 5, 4.</li>
   <li>Node 3 is a source (nothing points into it), so a complete DFS restarts at <b>3</b> last.</li>
 </ol><div class="ans">Answer: 1 2 5 4 3</div>`,
 expl:`Deep dive 1→2→5, backtrack to 4, then the unreachable source 3 last → 1 2 5 4 3.`},

{n:22, topic:"Subgraph", pts:5, type:"mcq",
 concept:`<p><b>Subgraph rule.</b> A subgraph keeps some of the original vertices (V′ ⊆ V) and some of the original edges (E′ ⊆ E), with one hard requirement: <b>every edge you keep must have both of its endpoints in V′</b>, and you can't invent edges that weren't in the original graph.</p>`,
 text:"Given V={a,c,d,f,h}, E={(a,c),(a,d),(d,f),(d,h)}, choose a valid <b>subgraph</b>.",
 options:["V={a,c,d} E={(a,c),(a,d),(d,f)}","V={a,c,f} E={(a,c),(a,d),(d,f)}","V={a,c,d} E={(a,c),(d,f)}","V={a,f,h} E={(a,h),(f,h)}","none of the other answers"],
 correct:4,
 solve:`<ol>
   <li>Option A: keeps edge (d,f) but f isn't in V′ → invalid.</li>
   <li>Option B: keeps (a,d) but d isn't in V′ → invalid.</li>
   <li>Option C: keeps (d,f) but f isn't in V′ → invalid.</li>
   <li>Option D: uses edges (a,h) and (f,h) — neither is in the original E → invalid.</li>
   <li>All four break a rule.</li>
 </ol><div class="ans">Answer: none of the other answers</div>`,
 expl:`Every option keeps an edge whose endpoint is missing, or invents a new edge. None is valid.`},

{n:23, topic:"AVL rotation", pts:5, type:"mcq",
 concept:`<p><b>Balance factor (BF)</b> = height(left) − height(right). An AVL node is "unbalanced" when |BF| = 2. To fix it you rotate, and the <b>pattern of the imbalance</b> tells you which rotation:</p>
 <p>LL → right rotate · RR → left rotate · LR → left-then-right · RL → right-then-left. Read it as "(heavy side of the unbalanced node)(heavy side of that child)."</p>`,
 text:"Given the AVL figure (Fatema's BF = 2), choose the rotation needed.",
 fig:`          Fatema (2)
         /        \\
     Abdul(0)    Howard(-1)
                  /     \\
              Grace(-1) Marvin(0)
                /
            George(0)`,
 options:["left rotate","right rotate","left-right rotate","right-left rotate","no correction needed"],
 correct:3,
 solve:`<ol>
   <li>Fatema's |BF| = 2 → it's unbalanced.</li>
   <li>The deeper (heavier) side is the <b>Right</b> child, Howard.</li>
   <li>Within Howard, the heavier side is its <b>Left</b> child, Grace (which has George below it).</li>
   <li>Right-then-Left imbalance → <b>right-left rotation</b> (a double rotation).</li>
 </ol><div class="ans">Answer: right-left rotate</div>`,
 expl:`Heavy on Howard (right), then Grace (left) → RL → right-left rotate.`},

{n:24, topic:"Identify structure", pts:5, type:"mcq",
 concept:`<p><b>How to classify a tree:</b> A <b>BST</b> needs left &lt; node &lt; right everywhere. A <b>heap</b> needs every parent ≤ (or ≥) its children AND a complete shape. An <b>AVL</b> is a balanced BST. If it's none of those but still has ≤ 2 children per node, it's just a plain <b>binary tree</b>.</p>`,
 text:"Choose the best description of the structure.",
 fig:`        45
       /  \\
     25    55
       \\
       35
       /
     20`,
 options:["minheap","maxheap","binary tree","BST","AVL tree","none of the other answers"],
 correct:2,
 solve:`<ol>
   <li>Test BST: 25's right subtree contains 35, then below 35 is 20. But 20 &lt; 25, and everything in 25's right subtree must be &gt; 25 → <b>BST rule broken</b>. So not BST, not AVL.</li>
   <li>Test heap: parents aren't consistently ≤ or ≥ children, and it isn't complete → not a heap.</li>
   <li>Every node still has at most 2 children → it's a valid <b>binary tree</b>.</li>
 </ol><div class="ans">Answer: binary tree</div>`,
 expl:`The 20 under 35 (in 25's right subtree) violates the BST rule, so it's just a binary tree.`},

{n:25, topic:"Identify structure", pts:5, type:"mcq",
 concept:`<p>Same classification skill, but with <b>string keys</b>. Compare strings character by character using ASCII: digits ('0'–'9' = 48–57) come <b>before</b> uppercase letters ('A'–'Z' = 65–90), which come before lowercase. A <b>min-heap</b> needs every parent ≤ its children and a complete shape.</p>`,
 text:"Choose the best description of the structure (string keys).",
 fig:`        '4b'
        /  \\
     '5g'   'a6'
     /  \\
  'Q3'  'D9'`,
 options:["minheap","maxheap","BST","AVL tree","none of the other answers"],
 correct:0,
 solve:`<ol>
   <li>'4b' vs children: '4b' ≤ '5g' (since '4'&lt;'5') and '4b' ≤ 'a6' (digit &lt; letter) ✓</li>
   <li>'5g' vs children: '5g' ≤ 'Q3' ('5'=53 &lt; 'Q'=81) and '5g' ≤ 'D9' ('5'=53 &lt; 'D'=68) ✓</li>
   <li>Every parent ≤ its children, and the shape is complete (left filled before right).</li>
 </ol><div class="ans">Answer: minheap</div>`,
 expl:`Parent ≤ children everywhere + complete shape = min-heap.`},

{n:26, topic:"Identify structure", pts:5, type:"mcq",
 concept:`<p><b>Tree vs forest.</b> A <b>tree</b> must be <b>connected</b> — every vertex reachable from every other. If the edges form two or more separate clumps, it's a <b>forest</b>, not a single tree. Draw the components to check.</p>`,
 text:"Given edges (a,c), (d,e), (d,f), (f,g), choose the best description.",
 fig:`Component 1:  a — c
Component 2:  e — d — f — g

Two disconnected pieces.`,
 options:["binary tree","tree","heap","BST","AVL tree","none of the other answers"],
 correct:5,
 solve:`<ol>
   <li>Draw it: {a,c} form one piece; {d,e,f,g} form another. They don't connect.</li>
   <li>A tree must be a single connected structure → this is a forest, not a tree.</li>
   <li>It's also not a heap/BST/AVL (those are specific kinds of trees).</li>
 </ol><div class="ans">Answer: none of the other answers</div>`,
 expl:`Two disconnected components = a forest, so none of the single-tree labels fit.`},

{n:27, topic:"Expression tree", pts:5, type:"mcq",
 concept:`<p><b>Expression tree.</b> Operators (+ − × /) sit at internal nodes; numbers sit at the leaves. To get <b>postfix</b> (operator after its operands), do a <b>post-order</b> traversal: Left, Right, then the operator.</p>
 <p><b>Watch operand order:</b> for a "/" node, the left child is the numerator and the right child is the denominator — don't swap them.</p>`,
 text:"Choose the appropriate <b>postfix expression</b> for the tree.",
 fig:`         −
        / \\
      16   /
          / \\
         2   5`,
 options:["-9","9","(16 - 5)/2","16 - 5/2","16 5 2 ^ -","16 5 2 - /","none of the other answers"],
 correct:6,
 solve:`<ol>
   <li>The tree means 16 − (2 / 5).</li>
   <li>Post-order: left child of "−" is 16 → write <b>16</b>.</li>
   <li>Right child is the "/" subtree: its left 2, its right 5, then the operator → <b>2 5 /</b>.</li>
   <li>Finally the root operator <b>−</b>. Full postfix: <b>16 2 5 / −</b>.</li>
   <li>None of the listed options shows "16 2 5 / −" (option F has the operands as 5 2, wrong order).</li>
 </ol><div class="ans">Answer: none of the other answers</div>`,
 expl:`Correct postfix is 16 2 5 / − , which isn't offered → none of the other answers.`},

{n:28, topic:"Heaps", pts:5, type:"mcq",
 concept:`<p><b>Counting leaves in a heap.</b> A heap is a complete binary tree stored in an array (indices 1…n). The second half of the array is always the leaves: indices ⌊n/2⌋+1 through n. So the leaf count is <b>⌈n/2⌉</b> (about half).</p>`,
 text:"Identify the number of <b>leaf elements</b> in a heap containing <b>20 nodes</b>.",
 options:["great than 14","14","11","10","13","less than 10","12"],
 correct:3,
 solve:`<ol>
   <li>Internal nodes occupy indices 1 … ⌊20/2⌋ = 1 … 10.</li>
   <li>Leaves occupy the rest: indices 11 … 20.</li>
   <li>That's 20 − 10 = <b>10</b> leaves (= ⌈20/2⌉).</li>
 </ol><div class="ans">Answer: 10</div>`,
 expl:`Leaves = ⌈n/2⌉ = ⌈20/2⌉ = 10.`},

{n:29, topic:"MST edges", pts:5, type:"mcq",
 concept:`<p><b>How many edges in a spanning tree?</b> To connect V vertices with no cycles you need exactly <b>V − 1</b> edges — one fewer than the number of vertices. This is true for <i>any</i> spanning tree, minimum or not. You don't even need to run the algorithm; just count the vertices.</p>`,
 text:"For a 10-vertex (A–J) weighted undirected graph, choose the <b>number of edges in the MST</b>.",
 fig:`Vertices A,B,C,D,E,F,G,H,I,J  →  V = 10`,
 options:["less than 6","6","7","8","9","greater than 9"],
 correct:4,
 solve:`<ol>
   <li>Count the vertices: A through J = 10.</li>
   <li>A spanning tree always uses V − 1 edges.</li>
   <li>10 − 1 = <b>9</b>.</li>
 </ol><div class="ans">Answer: 9</div>`,
 expl:`MST of V vertices has V − 1 edges; 10 − 1 = 9.`},

{n:30, topic:"AVL balance factor", pts:5, type:"mcq",
 concept:`<p><b>Balance factor of a node</b> = height(left subtree) − height(right subtree). The <b>height</b> of a subtree is the number of levels in it: a single leaf has height 1, an empty subtree has height 0. Compute each side's height, then subtract.</p>`,
 text:"Choose the correct balance factor to replace the <b>?</b> at Howard.",
 fig:`          Fatema (2)
         /        \\
     Abdul(0)    Howard(?)
                  /     \\
              Grace(0)  Marvin(1)
                          \\
                        Navid(0)`,
 options:["-3","-2","-1","0","1","2","3"],
 correct:2,
 solve:`<ol>
   <li>Howard's LEFT subtree is just Grace (a leaf) → height 1.</li>
   <li>Howard's RIGHT subtree is Marvin → Navid → height 2.</li>
   <li>BF = height(left) − height(right) = 1 − 2 = <b>−1</b>.</li>
 </ol><div class="ans">Answer: −1</div>`,
 expl:`Left height 1, right height 2 → 1 − 2 = −1.`},

{n:31, topic:"AVL rotation", pts:5, type:"mcq",
 concept:`<p><b>When does an AVL tree need fixing?</b> Only when some node's balance factor reaches <b>±2</b>. If every node's BF is −1, 0, or +1, the tree is already balanced and <b>no rotation is needed</b>. So: scan every node's BF; if all are within ±1, the answer is "no correction."</p>`,
 text:"Given the AVL figure (Fatema's BF = 1), choose the rotation needed, if any.",
 fig:`          Fatema (1)
         /        \\
     Abdul(0)    Howard(-1)
       /          /     \\
   Annie(0)   Grace(-1) Marvin(0)
                /
            George(0)`,
 options:["left rotate","right rotate","left-right rotate","right-left rotate","no correction needed"],
 correct:4,
 solve:`<ol>
   <li>Check each balance factor: Fatema +1, Howard −1, Grace −1, everyone else 0.</li>
   <li>All are within the allowed range {−1, 0, +1}.</li>
   <li>No node hits ±2, so the tree is balanced.</li>
 </ol><div class="ans">Answer: no correction needed</div>`,
 expl:`Every BF is within ±1, so the tree is already balanced — no rotation.`},

{n:32, topic:"AVL balance factor", pts:5, type:"mcq",
 concept:`<p>The balance-factor <b>formula</b> is always height(left) − height(right). The answer choices here are worded as "X minus Y," so figure out the height of each side first. A single child counts as height 1; a missing side is height 0.</p>`,
 text:"Choose the formula for computing the <b>balance factor of the 55 node</b>.",
 fig:`        45 (BF 0)
       /  \\
   25(1)   55(1)
     /       /
   35       65   ← single LEFT children`,
 options:["zero minus zero","zero minus one","one minus zero","one minus one","two minus two","none of the other answers"],
 correct:2,
 solve:`<ol>
   <li>Node 55 has a left child (65) → left height = 1.</li>
   <li>Node 55 has no right child → right height = 0.</li>
   <li>BF = height(left) − height(right) = 1 − 0 → "one minus zero."</li>
   <li>(Its shown BF of +1 confirms it leans left.)</li>
 </ol><div class="ans">Answer: one minus zero</div>`,
 expl:`Left height 1, right height 0 → "one minus zero."`},

{n:33, topic:"Prim's MST", pts:5, type:"mcq",
 concept:`<p><b>Prim's algorithm</b>, recap: start at a vertex, then repeatedly grab the <b>cheapest edge leaving the current tree</b> (one endpoint inside, one outside). Add the new vertex and repeat. Track the edges in the order you add them.</p>`,
 text:"Using <b>Prim's MST</b> starting at node <b>W</b>, choose the <b>3rd edge gathered</b>.",
 fig:`Edges (weights):
  V-W: 5   V-Z: 8   V-Y: 4
  W-X: 6   W-Y: 3
  X-Y: 7   Y-Z: 9`,
 options:["V-Y","W-X","X-Y","Y-Z","none of the other answers"],
 correct:1,
 solve:`<ol>
   <li>Start: tree = {W}. W's edges: W-V=5, W-X=6, W-Y=3. Cheapest = <b>W-Y (3)</b>. → 1st edge. Tree={W,Y}.</li>
   <li>Edges leaving the tree: W-V=5, W-X=6, Y-V=4, Y-X=7, Y-Z=9. Cheapest = <b>Y-V (4)</b>. → 2nd edge. Tree={W,Y,V}.</li>
   <li>Now: W-X=6, Y-X=7, Y-Z=9, V-Z=8. Cheapest = <b>W-X (6)</b>. → 3rd edge.</li>
 </ol><div class="ans">Answer: W-X</div>`,
 expl:`Edges added: WY(3), VY(4), then <b>WX(6)</b> is the 3rd.`}
];

const state={};
function toggleNav(){document.getElementById("nav").classList.toggle("open");document.getElementById("scrim").classList.toggle("show");}
function closeNav(){if(window.innerWidth<=820){document.getElementById("nav").classList.remove("open");document.getElementById("scrim").classList.remove("show");}}
function renderNav(){
  let h=`<div class="nav-label">Start</div><a href="#intro" onclick="closeNav()"><span class="qdot" style="background:var(--accent)"></span>How to use this</a><div class="nav-label">Questions 1–33</div>`;
  QS.forEach(q=>{h+=`<a href="#q${q.n}" onclick="closeNav()"><span class="qdot" id="dot${q.n}"></span>Q${q.n} · ${q.topic}</a>`;});
  document.getElementById("nav").innerHTML=h;
}
function renderMain(){
  let h=`<section class="intro" id="intro">
    <h2>Learn every question, from scratch</h2>
    <div class="card"><p>This covers <b>only</b> Practice Quiz 3 (the 33 screenshots). Every question is built in three parts:</p>
    <p>📖 <b>The concept</b> — the topic explained as if you've never seen it.</p>
    <p>❓ <b>The question</b> — the actual quiz question with its figure.</p>
    <p>🔑 <b>How to solve it</b> — a step-by-step walkthrough (tap to expand).</p>
    <p>Multiple-choice questions give instant feedback when you tap an answer. Written questions have a model answer to reveal.</p></div>
    <div class="card tip"><b>Works offline.</b> This whole page is self-contained — once it's on your device it runs with no internet, no server, anywhere.</div>
  </section>`;
  QS.forEach(q=>{h+=renderQ(q);});
  h+=`<div class="footer-note">33 questions · CSC 331 Practice Quiz 3 · concept + question + solution on every one</div>`;
  document.getElementById("main").innerHTML=h;
}
function renderQ(q){
  const fig=q.figHTML?`<div class="figure">${q.figHTML}</div>`:(q.fig?`<div class="figure"><pre>${esc(q.fig)}</pre></div>`:"");
  let inter="";
  if(q.type==="mcq"){
    const opts=q.options.map((o,i)=>`<div class="option" onclick="answer(${q.n},${i},${q.correct})" data-q="${q.n}" data-i="${i}"><span class="ol">${String.fromCharCode(65+i)}</span><span>${o}</span></div>`).join("");
    inter=`<div class="options">${opts}</div><div class="feedback" id="fb${q.n}"></div>
      <div class="solve"><button class="solve-toggle" onclick="toggleSolve(${q.n})">🔑 How to solve it</button><div class="solve-body" id="solve${q.n}">${q.solve}</div></div>
      <div class="qactions"><button class="qbtn" onclick="resetQ(${q.n})">↻ Reset</button></div>`;
  } else {
    inter=`<div class="solve"><button class="solve-toggle" onclick="toggleSolve(${q.n})">🔑 Show model answer & how to solve</button><div class="solve-body" id="solve${q.n}">${q.model}</div></div>`;
  }
  return `<div class="qcard" id="q${q.n}">
    <div class="qhead"><span class="qnum">Q${q.n}</span><span class="badge topic">${q.topic}</span>
      <span class="badge ${q.type==='written'?'written':''}">${q.type==='mcq'?'multiple choice':'written'}</span><span class="qpts">${q.pts} pts</span></div>
    <div class="concept"><div class="clab">📖 The concept</div>${q.concept}</div>
    <div class="qprompt"><div class="qlab">❓ The question</div><div class="qtext">${q.text}</div>${fig}${inter}</div>
  </div>`;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function answer(n,i,correct){
  if(state[n]&&state[n].answered)return;
  state[n]={answered:true,correct:i===correct};
  document.querySelectorAll(`[data-q="${n}"]`).forEach(o=>{o.classList.add("disabled");const idx=parseInt(o.dataset.i);if(idx===correct)o.classList.add("correct");else if(idx===i)o.classList.add("wrong");});
  const q=QS.find(x=>x.n===n),fb=document.getElementById("fb"+n);
  fb.className="feedback show "+(i===correct?"good":"bad");
  fb.innerHTML=`<span class="lab">${i===correct?"✓ Correct.":"✗ Not quite."}</span> ${q.expl} <i>Tap "How to solve it" for the full steps.</i>`;
  if(i!==correct){document.getElementById("solve"+n).classList.add("show");}
  updateProgress();updateDot(n);
}
function resetQ(n){
  delete state[n];
  document.querySelectorAll(`[data-q="${n}"]`).forEach(o=>o.classList.remove("disabled","correct","wrong"));
  const fb=document.getElementById("fb"+n);fb.className="feedback";fb.innerHTML="";
  document.getElementById("solve"+n).classList.remove("show");
  updateProgress();updateDot(n);
}
function toggleSolve(n){
  const s=document.getElementById("solve"+n);s.classList.toggle("show");
  if(s.classList.contains("show")&&!state[n]){state[n]={revealed:true};updateDot(n);}
}
function updateDot(n){const d=document.getElementById("dot"+n);if(!d)return;d.className="qdot";
  if(state[n]&&state[n].answered)d.classList.add(state[n].correct?"done":"wrong");
  else if(state[n]&&state[n].revealed)d.classList.add("seen");}
function updateProgress(){
  const m=QS.filter(q=>q.type==="mcq");const a=m.filter(q=>state[q.n]&&state[q.n].answered);const c=a.filter(q=>state[q.n].correct);
  document.getElementById("score").textContent=`${c.length} / ${m.length} MCQ`;
  document.getElementById("bar").style.width=(a.length/m.length*100)+"%";
}
renderNav();renderMain();updateProgress();
</script>
